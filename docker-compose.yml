services:
  # Express 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    restart: unless-stopped

  # Nginx 前端（多阶段构建）
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
